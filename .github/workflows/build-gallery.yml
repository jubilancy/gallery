name: Generate Gallery index
on: 
  push:
    paths:
      - 'assets/**'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build index.html
        run: |
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang='en'>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <title>Digital Shoebox</title>
            <style>
              :root { --gap: 12px; --size: 250px; }
              body { background-color: #0f0f0f; color: #fafafa; font-family: system-ui, sans-serif; margin: 0; padding: 40px var(--gap); }
              header { max-width: 1200px; margin: 0 auto 20px auto; }
              h1 { font-weight: 400; font-size: 1.2rem; opacity: 0.5; }
              .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--size), 1fr)); gap: var(--gap); max-width: 1200px; margin: 0 auto; }
              .card { background: transparent; border: none; overflow: hidden; aspect-ratio: 1 / 1; cursor: pointer; transition: opacity 0.2s ease; }
              .card:hover { opacity: 0.6; }
              img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
              #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fafafa; color: #000; padding: 8px 16px; border-radius: 20px; font-size: 14px; display: none; z-index: 100; font-weight: 500; }
              @media (max-width: 600px) { :root { --size: 140px; --gap: 4px; } }
            </style>
          </head>
          <body>
            <header><h1>Assets</h1></header>
            <div class='gallery'>
          EOF

          for img in assets/*; do
            if [[ "$img" == *"."* ]]; then
              echo "<div class='card' onclick='copyLink(\"$img\")'><img src='$img' loading='lazy' alt='Asset'></div>" >> index.html
            fi
          done

          cat << 'EOF' >> index.html
            </div>
            <div id='toast'>Link copied!</div>
            <script>
              function copyLink(path) {
                const url = window.location.origin + window.location.pathname.replace('index.html', '') + path;
                navigator.clipboard.writeText(url).then(() => {
                  const toast = document.getElementById('toast');
                  toast.style.display = 'block';
                  setTimeout(() => { toast.style.display = 'none'; }, 2000);
                }).catch(err => {
                  console.error('Failed to copy: ', err);
                });
              }
            </script>
          </body></html>
          EOF
          
      - name: Commit and push
        run: |
          git config --global user.name "Gallery Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "Fix gallery layout and copy script" || exit 0
          git push
