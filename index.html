  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Digital Shoebox</title>
  <style>
    :root { --gap: 16px; --size: 250px; }
    body { 
      background-color: #0f0f0f; 
      color: #fafafa; 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; 
      padding: 40px var(--gap); 
    }
    header {
      max-width: 1200px;
      margin: 0 auto 20px auto;
      padding: 0 5px;
    }
    h1 { font-weight: 400; font-size: 1.5rem; letter-spacing: -0.5px; opacity: 0.8; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--size), 1fr));
      gap: var(--gap);
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      border: 1px solid #2a2a2a;
      transition: all 0.2s ease-in-out;
    }
    .card:hover { 
      transform: translateY(-4px); 
      border-color: #444; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    @media (max-width: 600px) {
      :root { --size: 150px; --gap: 8px; }
    }
  </style>
</head>
