    body { background-color: #0f0f0f; color: #fafafa; font-family: system-ui, sans-serif; margin: 0; padding: 40px var(--gap); }
    header { max-width: 1200px; margin: 0 auto 20px auto; }
    h1 { font-weight: 400; font-size: 1.2rem; opacity: 0.5; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--size), 1fr)); gap: var(--gap); max-width: 1200px; margin: 0 auto; }
    .card { background: transparent; border: none; overflow: hidden; aspect-ratio: 1 / 1; cursor: pointer; transition: opacity 0.2s ease; }
    .card:hover { opacity: 0.6; }
    img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fafafa; color: #000; padding: 8px 16px; border-radius: 20px; font-size: 14px; display: none; z-index: 100; font-weight: 500; }
    @media (max-width: 600px) { :root { --size: 140px; --gap: 4px; } }
  </style>

  <script>
    async function copyImage(element) {
      const img = element.querySelector('img');
      try {
        const data = await fetch(img.src);
        const blob = await data.blob();
        
        // ClipboardItem requires specific MIME types
        // Converting SVGs to Blobs for clipboard can be finicky in some browsers
        await navigator.clipboard.write([
          new ClipboardItem({
            [blob.type]: blob
          })
        ]);
        
        showToast();
      } catch (err) {
        console.error('Failed to copy image: ', err);
        // Fallback: Copy URL if image data fails
        navigator.clipboard.writeText(img.src);
      }
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
  </script>
